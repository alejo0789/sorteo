<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page - Acertemos UI</title>
    <link rel="stylesheet" href="../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Brand Header -->
    <header class="brand-header">
        <img src="/assets/acertemos logo.png" alt="Logo" class="brand-logo">
    </header>

    <main style="max-width: 1000px; margin: 40px auto; padding: 20px;">
        <h1 style="color: var(--acertemos-blue); margin-bottom: 2rem; text-align: center;">Seleccione un Formulario</h1>

        <div style="display: grid; gap: 20px;">
            <!-- Example Card -->
            <div class="featured-card">
                <div class="featured-icon">📊</div>
                <div class="featured-content">
                    <h2 class="featured-title">Reporte de Clima Organizacional</h2>
                    <p class="featured-description">Evaluación detallada del ambiente laboral y bienestar de los
                        colaboradores.</p>
                </div>
                <div class="featured-action">Comenzar</div>
            </div>

            <!-- Another Card -->
            <div class="featured-card">
                <div class="featured-icon">👤</div>
                <div class="featured-content">
                    <h2 class="featured-title">Perfil Psicosocial</h2>
                    <p class="featured-description">Análisis de factores de riesgo y protectores en el entorno de
                        trabajo.</p>
                </div>
                <div class="featured-action">Comenzar</div>
            </div>
        </div>
    </main>
</body>

</html>
