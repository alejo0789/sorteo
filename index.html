<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>Registro Sorteos - Acertemos</title>
    <link rel="stylesheet" href="acertemos_premium_ui/resources/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #002147 0%, #004e89 100%);
        }

        body {
            background-color: #f4f7fa;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .chat-wrapper {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 33, 71, 0.15);
            display: flex;
            flex-direction: column;
            height: 600px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }

        .chat-header-premium {
            background: var(--primary-gradient);
            padding: 20px;
            color: white;
            border-bottom: 4px solid #ffcc00;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar-circle {
            width: 45px;
            height: 45px;
            background: #ffcc00;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #002147;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .chat-messages {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Spacer: pushes messages to the bottom when chat is not full (like WhatsApp).
           As messages accumulate and overflow, this shrinks to 0 automatically. */
        .chat-messages::before {
            content: '';
            flex: 1 1 auto;
            display: block;
        }

        .msg {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 1em;
            line-height: 1.5;
            position: relative;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-bot {
            align-self: flex-start;
            background: #f1f5f9;
            color: #1e293b;
            border-bottom-left-radius: 4px;
            border: 1px solid #e2e8f0;
        }

        .msg-user {
            align-self: flex-end;
            background: var(--primary-gradient);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(0, 33, 71, 0.15);
        }

        .chat-footer {
            padding: 20px;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
            position: relative;
        }

        .font-controls {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .font-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: all 0.2s;
        }

        .font-btn:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .font-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.8;
            margin-right: 5px;
        }

        .premium-input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 30px;
            outline: none;
            font-size: 1rem;
            transition: all 0.2s;
            background: white;
            color: #1e293b;
        }

        .premium-input:focus {
            border-color: #004e89;
            background: white;
        }

        .premium-input:disabled {
            background: #f1f5f9;
            color: #94a3b8;
            cursor: not-allowed;
        }

        .premium-send {
            background: #ffcc00;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #002147;
            transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(255, 204, 0, 0.3);
        }

        .premium-send:hover {
            transform: scale(1.05);
            background: #e6b800;
        }

        .premium-camera {
            background: white;
            border: 2px solid #e2e8f0;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .premium-camera:hover {
            border-color: #004e89;
            color: #004e89;
            background: #f1f5f9;
        }

        .premium-camera.active {
            border-color: #ffcc00;
            background: #fffbeb;
            color: #b45309;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(255, 204, 0, 0.4);
            }

            50% {
                box-shadow: 0 0 0 8px rgba(255, 204, 0, 0);
            }
        }

        .msg-img img {
            max-width: 100%;
            border-radius: 12px;
            display: block;
            margin-top: 5px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 5px 10px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #94a3b8;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-6px);
            }
        }

        @media (max-width: 600px) {
            .brand-logo {
                max-width: 200px;
            }

            .brand-header {
                padding: 10px;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 100;
            }

            /* chat-wrapper top/bottom are set dynamically in JS */
            .chat-wrapper {
                position: fixed;
                left: 0;
                right: 0;
                margin: 0;
                border-radius: 0;
                border: none;
            }

            .chat-messages {
                padding: 15px;
            }

            .chat-footer {
                padding: 12px;
            }

            .msg {
                max-width: 90%;
            }

            .chat-footer-note {
                padding: 8px 12px;
                font-size: 0.7rem;
            }
        }

        .chat-footer-note {
            text-align: center;
            font-size: 0.75rem;
            color: #64748b;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.95);
            border-top: 1px solid #f1f5f9;
            line-height: 1.4;
        }

        .chat-footer-note a {
            color: #004e89;
            font-weight: 700;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <header class="brand-header">
        <img src="assets/acertemos_logo.png" alt="Acertemos" class="brand-logo">
    </header>

    <div class="chat-wrapper">
        <div class="chat-header-premium">
            <img src="assets/nova.jpeg" alt="Nova"
                style="width:45px;height:45px;border-radius:50%;object-fit:cover;border:2px solid #ffcc00;box-shadow:0 4px 10px rgba(0,0,0,0.25);flex-shrink:0;">
            <div>
                <div style="font-weight: 800; font-size: 1.1rem;">Nova</div>
                <div style="font-size: 0.8rem; opacity: 0.9;">Asistente de sorteos · En línea</div>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <!-- Mensajes dinámicos -->
        </div>

        <div class="chat-footer">
            <input type="file" id="fileInput" style="display: none;" accept="image/*">
            <button id="cameraBtn" class="premium-camera" title="Adjuntar foto del ticket">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
            </button>
            <input type="text" id="chatInput" class="premium-input" placeholder="Escribe tu respuesta aquí...">
            <button id="sendBtn" class="premium-send">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
        <div class="chat-footer-note">
            Aplican <a href="terminos.html" target="_blank">Términos y condiciones</a>. Al participar autorizas el
            tratamiento de tus datos personales.
        </div>
    </div>

    <script>
        // Auto-detect API root based on the current location
        const API_URL = window.location.pathname.includes('/registro_sorteos/')
            ? "/registro_sorteos/"
            : "";
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const cameraBtn = document.getElementById('cameraBtn');
        const fileInput = document.getElementById('fileInput');

        // Flow: cedula → nombre → telefono → registro → comprobante → done
        let step = "cedula";
        let sorteoId = null;
        let sorteoNombre = "";
        let userData = { cedula: "", nombre: "", telefono: "", comprobante_url: null };
        let pendingRegistro = null;
        let currentFontSize = 15;

        function changeFontSize(delta) {
            currentFontSize = Math.min(24, Math.max(12, currentFontSize + delta));
            chatMessages.style.fontSize = currentFontSize + 'px';
            chatInput.style.fontSize = currentFontSize + 'px';
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function formatText(text) {
            if (!text) return "";
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/_(.*?)_/g, '<em>$1</em>')
                .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" style="color: inherit; font-weight: bold; text-decoration: underline;">$1</a>')
                .replace(/\n/g, '<br>');
        }

        function addMessage(text, type, imgUrl = null) {
            const div = document.createElement('div');
            div.className = `msg msg-${type}`;
            if (imgUrl) {
                div.classList.add('msg-img');
                div.innerHTML = (text ? formatText(text) + '<br>' : '') +
                    `<img src="${imgUrl}" alt="Ticket">`;
            } else {
                div.innerHTML = formatText(text);
            }
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            // Guarantee visibility on mobile even with keyboard open
            setTimeout(() => div.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 60);
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'msg msg-bot';
            div.innerHTML = `<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return div;
        }

        function enableInput(placeholder = "Escribe tu respuesta aquí...") {
            chatInput.disabled = false;
            chatInput.placeholder = placeholder;
            chatInput.focus();
            cameraBtn.classList.remove('active');
        }

        function disableInput(placeholder = "Adjunta el ticket con el botón 📷...") {
            chatInput.disabled = true;
            chatInput.placeholder = placeholder;
        }

        function setCameraActive(active) {
            if (active) {
                cameraBtn.classList.add('active');
                cameraBtn.title = "📷 ¡Adjunta la foto aquí!";
            } else {
                cameraBtn.classList.remove('active');
                cameraBtn.title = "Adjuntar foto del ticket";
            }
        }

        async function init() {
            try {
                const res = await fetch(`${API_URL}sorteos`);
                const sorteos = await res.json();
                if (sorteos.length > 0) {
                    sorteoId = sorteos[0].id;
                    sorteoNombre = sorteos[0].nombre_sorteo;
                    const typing = showTyping();
                    setTimeout(() => {
                        typing.remove();
                        addMessage(
                            `¡Hola! 👋 Estás participando en el sorteo **${sorteos[0].nombre_sorteo}**.\n\nPor favor, indícame tu **número de cédula** para comenzar.\n\n_Al continuar, confirmas que has leído nuestros [Términos y condiciones](terminos.html)._`,
                            "bot"
                        );
                    }, 1000);
                } else {
                    addMessage("No hay sorteos activos en este momento.", "bot");
                    disableInput("Sin sorteos activos");
                }
            } catch (e) {
                addMessage("Error de conexión. Verifica que el servidor esté activo.", "bot");
            }
        }

        async function handleSend() {
            let val = chatInput.value.trim();
            if (!val || chatInput.disabled) return;

            addMessage(val, "user");
            chatInput.value = "";
            disableInput("Procesando...");

            const typing = showTyping();

            try {
                if (step === "cedula") {
                    val = val.replace(/[.,\s]/g, "");
                    userData.cedula = val;

                    const res = await fetch(`${API_URL}check-user/${val}`);
                    const user = await res.json();
                    typing.remove();

                    if (user) {
                        userData.nombre = user.nombre_completo;
                        userData.telefono = user.telefono || "";
                        addMessage(`Bienvenido de nuevo, **${user.nombre_completo}**. 👋`, "bot");
                        addMessage(`Ingresa el **número de ticket del Baloto Revancha** que deseas registrar.`, "bot");
                        step = "registro";
                        enableInput("Número de ticket...");
                    } else {
                        addMessage(`No tenemos tu registro aún. ¿Cuáles son tus **nombres y apellidos completos**?`, "bot");
                        step = "nombre";
                        enableInput("Nombres y apellidos...");
                    }
                }
                else if (step === "nombre") {
                    if (val.length < 3) {
                        typing.remove();
                        addMessage("⚠️ Por favor ingresa tu nombre completo.", "bot");
                        enableInput("Nombres y apellidos...");
                        return;
                    }
                    userData.nombre = val;
                    await wait(700);
                    typing.remove();
                    addMessage(`Gusto en conocerte, **${val}**. Ahora necesito tu **número de teléfono de contacto**.`, "bot");
                    step = "telefono";
                    enableInput("Número de teléfono...");
                }
                else if (step === "telefono") {
                    const tel = val.replace(/[\s\-\(\)]/g, "");
                    if (!/^\d{7,15}$/.test(tel)) {
                        typing.remove();
                        addMessage("⚠️ Por favor ingresa un número de teléfono válido (solo dígitos, mínimo 7).", "bot");
                        enableInput("Número de teléfono...");
                        return;
                    }
                    userData.telefono = tel;
                    await wait(700);
                    typing.remove();
                    addMessage(`Perfecto. Ahora ingresa el **número de ticket del Baloto Revancha** que deseas registrar.`, "bot");
                    step = "registro";
                    enableInput("Número de ticket...");
                }
                else if (step === "registro") {
                    if (val.length < 1) {
                        typing.remove();
                        addMessage("⚠️ Por favor ingresa el número de ticket.", "bot");
                        enableInput("Número de ticket...");
                        return;
                    }
                    pendingRegistro = val;
                    await wait(700);
                    typing.remove();
                    addMessage(`¡Perfecto! Número de ticket **${val}** recibido. 🎟️`, "bot");
                    await wait(600);
                    addMessage(`Ahora adjunta una **foto del ticket de Baloto Revancha** usando el botón 📷 de abajo. La imagen es **obligatoria** para completar el registro.`, "bot");
                    step = "comprobante";
                    disableInput("Adjunta la foto del ticket con el botón 📷...");
                    setCameraActive(true);
                    return; // user must use camera button
                }
            } catch (e) {
                typing.remove();
                addMessage("Ocurrió un error de red. Intenta de nuevo.", "bot");
                enableInput();
            }
        }

        function confetti() {
            const colors = ['#ffcc00', '#002147', '#22c55e', '#ff4d4d', '#ffffff'];
            for (let i = 0; i < 100; i++) {
                const p = document.createElement('div');
                const size = Math.random() * 10 + 5 + 'px';
                p.style.cssText = `position:fixed;width:${size};height:${Math.random() > 0.5 ? size : '4px'};
                    background:${colors[Math.floor(Math.random() * colors.length)]};
                    left:${Math.random() * 100}vw;top:-20px;z-index:9999;
                    border-radius:${Math.random() > 0.5 ? '50%' : '2px'}`;
                document.body.appendChild(p);
                const duration = Math.random() * 3000 + 2000;
                const dx = (Math.random() - 0.5) * 400;
                const rot = Math.random() * 720 + 360;
                p.animate([
                    { transform: `translate(0,0) rotate(0deg)`, opacity: 1 },
                    { transform: `translate(${dx}px,100vh) rotate(${rot}deg)`, opacity: 0 }
                ], { duration, delay: Math.random() * 1500, easing: 'cubic-bezier(0,.9,.6,1)' })
                    .onfinish = () => p.remove();
            }
        }

        cameraBtn.onclick = () => {
            if (step !== "done") fileInput.click();
        };

        fileInput.onchange = async () => {
            if (fileInput.files.length === 0) return;
            if (step !== "comprobante") {
                fileInput.value = "";
                return;
            }

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);

            disableInput("Subiendo imagen...");
            const typing = showTyping();

            try {
                const uploadUrl = `${API_URL}upload-receipt${sorteoNombre ? `?sorteo_nombre=${encodeURIComponent(sorteoNombre)}` : ''}`;
                const uploadRes = await fetch(uploadUrl, { method: 'POST', body: formData });
                const uploadData = await uploadRes.json();
                typing.remove();

                if (!uploadData.url) {
                    addMessage("Error al subir la imagen. Intenta de nuevo.", "bot");
                    disableInput("Adjunta la foto del ticket con el botón 📷...");
                    fileInput.value = "";
                    return;
                }

                addMessage("He adjuntado mi ticket:", "user", uploadData.url);
                setCameraActive(false);

                // Submit registration
                const typing2 = showTyping();
                const regRes = await fetch(`${API_URL}register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        cedula: userData.cedula,
                        nombre_completo: userData.nombre,
                        telefono: userData.telefono,
                        sorteo_id: sorteoId,
                        numero_registro: pendingRegistro,
                        comprobante_url: uploadData.url
                    })
                });
                typing2.remove();

                if (regRes.ok) {
                    const regData = await regRes.json();
                    const total = regData.total_tickets;
                    addMessage(`✅ ¡Ticket registrado exitosamente! Mucha suerte. 🎉`, "bot");
                    addMessage(`Llevas **${total} ticket${total !== 1 ? 's' : ''} registrado${total !== 1 ? 's' : ''}** en este sorteo.`, "bot");
                    if (total < 10) {
                        const faltan = 10 - total;
                        addMessage(
                            `🏍️ ¡Recuerda! Si llegas a **10 tickets registrados** puedes participar por la **motocicleta eléctrica**. Te faltan **${faltan}** ticket${faltan !== 1 ? 's' : ''}.`,
                            "bot"
                        );
                    } else {
                        addMessage(
                            `🏍️ ¡Felicitaciones! Ya tienes **${total} tickets** registrados. ¡Estás participando por la **motocicleta eléctrica**!`,
                            "bot"
                        );
                    }
                    confetti();
                    step = "done";
                    disableInput("¡Registro completado! 🎉");
                } else {
                    const errorData = await regRes.json();
                    const errorMsg = errorData.detail || "Hubo un error en el registro.";
                    addMessage(`⚠️ **Error:** ${errorMsg}`, "bot");
                    addMessage(`Por favor, ingresa un **número de ticket válido** e intenta de nuevo.`, "bot");
                    step = "registro";
                    pendingRegistro = null;
                    enableInput("Número de ticket...");
                }
            } catch (e) {
                typing.remove();
                addMessage("Ocurrió un error al procesar la imagen.", "bot");
                disableInput("Adjunta la foto del ticket con el botón 📷...");
            }
            fileInput.value = "";
        };

        const wait = (ms) => new Promise(res => setTimeout(res, ms));

        sendBtn.onclick = handleSend;
        chatInput.onkeydown = (e) => { if (e.key === "Enter") handleSend(); };

        // ---- Mobile layout: dynamic positioning ----
        // Measures header height in real-time and adjusts the chat-wrapper
        // so it always fills the space between header and top of keyboard.
        function setupMobileLayout() {
            const isMobile = window.matchMedia('(max-width: 600px)').matches;
            if (!isMobile) return;

            const wrapper = document.querySelector('.chat-wrapper');
            const header = document.querySelector('.brand-header');

            function updateLayout() {
                const headerH = header.offsetHeight;
                const vv = window.visualViewport;
                // keyboardHeight = space between bottom of visual viewport and bottom of layout viewport
                const kbHeight = vv
                    ? Math.max(0, window.innerHeight - vv.offsetTop - vv.height)
                    : 0;

                wrapper.style.top = headerH + 'px';
                wrapper.style.bottom = kbHeight + 'px';
                wrapper.style.height = 'auto';

                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            updateLayout();
            window.addEventListener('resize', updateLayout);

            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', updateLayout);
                window.visualViewport.addEventListener('scroll', updateLayout);
            }
        }

        window.onload = () => { init(); setupMobileLayout(); };
    </script>
</body>

</html>
