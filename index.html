<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>Registro Sorteos - Acertemos</title>
    <link rel="stylesheet" href="acertemos_premium_ui/resources/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #002147 0%, #004e89 100%);
        }

        body {
            background-color: #f4f7fa;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .chat-wrapper {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 33, 71, 0.15);
            display: flex;
            flex-direction: column;
            height: 600px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }

        .chat-header-premium {
            background: var(--primary-gradient);
            padding: 20px;
            color: white;
            border-bottom: 4px solid #ffcc00;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar-circle {
            width: 45px;
            height: 45px;
            background: #ffcc00;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #002147;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .chat-messages {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Spacer: pushes messages to the bottom when chat is not full (like WhatsApp).
           As messages accumulate and overflow, this shrinks to 0 automatically. */
        .chat-messages::before {
            content: '';
            flex: 1 1 auto;
            display: block;
        }

        .msg {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 1em;
            line-height: 1.5;
            position: relative;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-bot {
            align-self: flex-start;
            background: #f1f5f9;
            color: #1e293b;
            border-bottom-left-radius: 4px;
            border: 1px solid #e2e8f0;
        }

        .msg-user {
            align-self: flex-end;
            background: var(--primary-gradient);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(0, 33, 71, 0.15);
        }

        .chat-footer {
            padding: 20px;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
            position: relative;
        }

        .font-controls {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .font-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: all 0.2s;
        }

        .font-btn:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .font-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.8;
            margin-right: 5px;
        }

        .premium-input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 30px;
            outline: none;
            font-size: 1rem;
            transition: all 0.2s;
            background: white;
            color: #1e293b;
        }

        .premium-input:focus {
            border-color: #004e89;
            background: white;
        }

        .premium-input:disabled {
            background: #f1f5f9;
            color: #94a3b8;
            cursor: not-allowed;
        }

        .premium-send {
            background: #ffcc00;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #002147;
            transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(255, 204, 0, 0.3);
        }

        .premium-send:hover {
            transform: scale(1.05);
            background: #e6b800;
        }

        .premium-camera {
            background: white;
            border: 2px solid #e2e8f0;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .premium-camera:hover {
            border-color: #004e89;
            color: #004e89;
            background: #f1f5f9;
        }

        .premium-camera.active {
            border-color: #ffcc00;
            background: #fffbeb;
            color: #b45309;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(255, 204, 0, 0.4);
            }

            50% {
                box-shadow: 0 0 0 8px rgba(255, 204, 0, 0);
            }
        }

        .msg-img img {
            max-width: 100%;
            border-radius: 12px;
            display: block;
            margin-top: 5px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 5px 10px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #94a3b8;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-6px);
            }
        }

        @media (max-width: 600px) {
            .brand-logo {
                max-width: 200px;
            }

            .brand-header {
                padding: 10px;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 100;
            }

            /* chat-wrapper top/bottom are set dynamically in JS */
            .chat-wrapper {
                position: fixed;
                left: 0;
                right: 0;
                margin: 0;
                border-radius: 0;
                border: none;
            }

            .chat-messages {
                padding: 15px;
            }

            .chat-footer {
                padding: 12px;
            }

            .msg {
                max-width: 90%;
            }

            .chat-footer-note {
                padding: 8px 12px;
                font-size: 0.7rem;
            }
        }

        .chat-footer-note {
            text-align: center;
            font-size: 0.75rem;
            color: #64748b;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.95);
            border-top: 1px solid #f1f5f9;
            line-height: 1.4;
        }

        .chat-footer-note a {
            color: #004e89;
            font-weight: 700;
            text-decoration: underline;
        }
        
        /* Popup Sorteo Styles */
        .sorteo-popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .sorteo-popup-content {
            background: white;
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
            animation: zoomIn 0.3s ease-out;
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .sorteo-popup-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .sorteo-popup-img {
            width: 100%;
            display: block;
            object-fit: cover;
            max-height: 50vh;
        }

        .sorteo-popup-body {
            padding: 25px;
            text-align: center;
        }

        .sorteo-popup-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: #002147;
            margin-bottom: 10px;
        }

        .sorteo-popup-desc {
            color: #64748b;
            font-size: 1rem;
            margin-bottom: 20px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .sorteo-popup-btn {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 33, 71, 0.2);
            transition: transform 0.2s;
            width: 100%;
        }

        .sorteo-popup-btn:hover {
            transform: translateY(-2px);
        }

        /* Orientación Guía Styles */
        .orientation-guide {
            display: flex;
            gap: 20px;
            justify-content: center;
            background: #f0f7ff;
            padding: 15px;
            border-radius: 15px;
            margin: 10px 0;
            border: 1px solid #cce3ff;
        }

        .orientation-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .phone-mockup {
            width: 30px;
            height: 50px;
            border: 2.5px solid #1e293b;
            border-radius: 6px;
            position: relative;
            background: white;
            transition: all 0.3s;
        }

        .phone-mockup.horizontal {
            width: 50px;
            height: 30px;
        }

        .phone-mockup.correct {
            border-color: #22c55e;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
        }

        .phone-mockup.incorrect {
            border-color: #ef4444;
            opacity: 0.6;
        }

        .phone-mockup .check {
            color: #22c55e;
            font-weight: 800;
            font-size: 1.2rem;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .phone-mockup .cross {
            color: #ef4444;
            font-weight: 800;
            font-size: 1.2rem;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .orientation-label {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .btn-view-example {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            color: #004e89;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            border: 2px solid #004e89;
            margin-top: 10px;
            transition: all 0.2s;
            animation: pulse-button 2s infinite;
        }

        @keyframes pulse-button {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 78, 137, 0.4); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(0, 78, 137, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 78, 137, 0); }
        }

        .btn-view-example:hover {
            background: #004e89;
            color: white;
        }

        .pointing-hands {
            display: inline-block;
            animation: bounce-horizontal 1s infinite alternate;
        }

        @keyframes bounce-horizontal {
            from { transform: translateX(0); }
            to { transform: translateX(5px); }
        }

        /* Action Buttons Styles */
        .btn-action-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            justify-content: flex-start;
            flex-wrap: wrap;
        }

        .btn-action {
            background: white;
            color: #004e89;
            border: 2px solid #004e89;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-action:hover {
            background: #004e89;
            color: white;
        }
        
        .btn-action.btn-yes {
            border-color: #22c55e;
            color: #22c55e;
        }
        
        .btn-action.btn-yes:hover {
            background: #22c55e;
            color: white;
        }
        
        .btn-action.btn-no {
            border-color: #ef4444;
            color: #ef4444;
        }
        
        .btn-action.btn-no:hover {
            background: #ef4444;
            color: white;
        }
    </style>
</head>

<body>

    <header class="brand-header">
        <img src="assets/acertemos_logo.png" alt="Acertemos" class="brand-logo">
    </header>

    <div class="chat-wrapper">
        <div class="chat-header-premium">
            <img src="assets/nova.jpeg" alt="Nova"
                style="width:45px;height:45px;border-radius:50%;object-fit:cover;border:2px solid #ffcc00;box-shadow:0 4px 10px rgba(0,0,0,0.25);flex-shrink:0;">
            <div>
                <div style="font-weight: 800; font-size: 1.1rem;">Nova</div>
                <div style="font-size: 0.8rem; opacity: 0.9;">Asistente de sorteos · En línea</div>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <!-- Mensajes dinámicos -->
        </div>

        <div class="chat-footer">
            <input type="file" id="fileInput" style="display: none;" accept="image/*">
            <button id="cameraBtn" class="premium-camera" title="Adjuntar foto del ticket">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
            </button>
            <input type="text" id="chatInput" class="premium-input" placeholder="Escribe tu respuesta aquí...">
            <button id="sendBtn" class="premium-send">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
        <div class="chat-footer-note">
            Aplican <a href="terminos.html" target="_blank">Términos y condiciones</a>. Al participar autorizas el
            tratamiento de tus datos personales.
        </div>
    </div>

    <!-- Sorteo Popup -->
    <div class="sorteo-popup-overlay" id="sorteoPopup">
        <div class="sorteo-popup-content">
            <button class="sorteo-popup-close" onclick="closePopup()">&times;</button>
            <img src="" alt="Sorteo" id="popupImagen" class="sorteo-popup-img" style="display: none;">
            <div class="sorteo-popup-body">
                <h2 class="sorteo-popup-title" id="popupNombre">Sorteo</h2>
                <div class="sorteo-popup-desc" id="popupDescripcion"></div>
                <button class="sorteo-popup-btn" onclick="closePopup()">¡Quiero participar!</button>
            </div>
        </div>
    </div>

    <script>
        // Auto-detect API root based on the current location
        const API_URL = window.location.pathname.includes('/registro_sorteos/')
            ? "/registro_sorteos/"
            : "";
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const cameraBtn = document.getElementById('cameraBtn');
        const fileInput = document.getElementById('fileInput');

        // Flow: cedula → nombre → telefono → registro → comprobante → done
        let step = "cedula";
        let sorteoId = null;
        let sorteoNombre = "";
        let userData = { cedula: "", nombre: "", telefono: "", comprobante_url: null };
        let pendingRegistro = null;
        let currentFontSize = 15;

        function changeFontSize(delta) {
            currentFontSize = Math.min(24, Math.max(12, currentFontSize + delta));
            chatMessages.style.fontSize = currentFontSize + 'px';
            chatInput.style.fontSize = currentFontSize + 'px';
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function formatText(text) {
            if (!text) return "";
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/_(.*?)_/g, '<em>$1</em>')
                .replace(/\[btn:(.*?)]\((.*?)\)/g, '<a href="$2" target="_blank" class="btn-view-example"><span class="pointing-hands">👉</span> $1</a>')
                .replace(/\[choices:(.*?)\]/g, (match, p1) => {
                    const choices = p1.split('|');
                    let html = '<div class="btn-action-container">';
                    choices.forEach(c => {
                        const cls = c.toLowerCase() === 'sí' || c.toLowerCase() === 'si' ? 'btn-yes' : (c.toLowerCase() === 'no' ? 'btn-no' : '');
                        html += `<button class="btn-action ${cls}" onclick="sendAction('${c}')">${c}</button>`;
                    });
                    html += '</div>';
                    return html;
                })
                .replace(/\[guide:vertical\]/g, `
                    <div class="orientation-guide">
                        <div class="orientation-item">
                            <div class="phone-mockup correct">
                                <div class="check">✓</div>
                            </div>
                            <span class="orientation-label" style="color: #22c55e;">Vertical</span>
                        </div>
                        <div class="orientation-item">
                            <div class="phone-mockup horizontal incorrect">
                                <div class="cross">✕</div>
                            </div>
                            <span class="orientation-label" style="color: #ef4444;">Horizontal</span>
                        </div>
                    </div>
                `)
                .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" style="color: inherit; font-weight: bold; text-decoration: underline;">$1</a>')
                .replace(/\n/g, '<br>');
        }

        function addMessage(text, type, imgUrl = null) {
            const div = document.createElement('div');
            div.className = `msg msg-${type}`;
            if (imgUrl) {
                div.classList.add('msg-img');
                div.innerHTML = (text ? formatText(text) + '<br>' : '') +
                    `<img src="${imgUrl}" alt="Ticket">`;
            } else {
                div.innerHTML = formatText(text);
            }
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            // Guarantee visibility on mobile even with keyboard open
            setTimeout(() => div.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 60);
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'msg msg-bot';
            div.innerHTML = `<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return div;
        }

        function enableInput(placeholder = "Escribe tu respuesta aquí...") {
            chatInput.disabled = false;
            chatInput.placeholder = placeholder;
            chatInput.focus();
            cameraBtn.classList.remove('active');
        }

        function disableInput(placeholder = "Adjunta el ticket con el botón 📷...") {
            chatInput.disabled = true;
            chatInput.placeholder = placeholder;
        }

        function setCameraActive(active) {
            if (active) {
                cameraBtn.classList.add('active');
                cameraBtn.title = "📷 ¡Adjunta la foto aquí!";
            } else {
                cameraBtn.classList.remove('active');
                cameraBtn.title = "Adjuntar foto del ticket";
            }
        }

        function closePopup() {
            document.getElementById('sorteoPopup').style.display = 'none';
        }

        async function init() {
            try {
                const res = await fetch(`${API_URL}sorteos`);
                const sorteos = await res.json();
                if (sorteos.length > 0) {
                    const s = sorteos[0];
                    sorteoId = s.id;
                    sorteoNombre = s.nombre_sorteo;
                    
                    if (s.imagen_url || s.descripcion) {
                        const popup = document.getElementById('sorteoPopup');
                        document.getElementById('popupNombre').textContent = s.nombre_sorteo;
                        if (s.imagen_url) {
                            const img = document.getElementById('popupImagen');
                            img.src = s.imagen_url;
                            img.style.display = 'block';
                        }
                        if (s.descripcion) {
                            document.getElementById('popupDescripcion').textContent = s.descripcion;
                            document.getElementById('popupDescripcion').style.display = 'block';
                        } else {
                            document.getElementById('popupDescripcion').style.display = 'none';
                        }
                        popup.style.display = 'flex';
                    }

                    const typing = showTyping();
                    setTimeout(() => {
                        typing.remove();
                        addMessage(
                            `¡Hola! 👋 Estás participando en el sorteo **${s.nombre_sorteo}**.\n\nPor favor, indícame tu **número de cédula** para comenzar.\n\n_Al continuar, confirmas que has leído nuestros [Términos y condiciones](terminos.html)._`,
                            "bot"
                        );
                    }, 1000);
                } else {
                    addMessage("No hay sorteos activos en este momento.", "bot");
                    disableInput("Sin sorteos activos");
                }
            } catch (e) {
                addMessage("Error de conexión. Verifica que el servidor esté activo.", "bot");
            }
        }

        async function handleSend() {
            let val = chatInput.value.trim();
            if (!val || chatInput.disabled) return;

            addMessage(val, "user");
            chatInput.value = "";
            disableInput("Procesando...");

            const typing = showTyping();

            try {
                if (step === "cedula") {
                    // Limpiar cédula
                    const cleanVal = val.replace(/[.,\s]/g, "");
                    
                    // Validación: solo números y longitud mínima
                    if (!/^\d+$/.test(cleanVal) || cleanVal.length < 6) {
                        typing.remove();
                        addMessage("⚠️ Por favor ingresa un número de cédula válido (solo números, mínimo 6 dígitos).", "bot");
                        enableInput("Número de cédula...");
                        return;
                    }

                    userData.cedula = cleanVal;

                    const res = await fetch(`${API_URL}check-user/${cleanVal}`);
                    const user = await res.json();
                    typing.remove();

                    if (user) {
                        addMessage(`Bienvenido de nuevo, **${user.nombre_completo}**. 👋`, "bot");
                        addMessage(`Adjunta una **foto del ticket de Baloto Revancha** usando el botón 📷 de abajo. 
                        
Asegúrate de que la foto sea **completa y en forma vertical**:

[guide:vertical]

La imagen es **obligatoria** y el sistema extraerá tu número automáticamente.`, "bot");
                        step = "comprobante";
                        disableInput("Adjunta la foto con el botón 📷...");
                        setCameraActive(true);
                    } else {
                        addMessage(`No tenemos tu registro aún. ¿Cuáles son tus **nombres y apellidos completos**?`, "bot");
                        step = "nombre";
                        enableInput("Nombres y apellidos...");
                    }
                }
                else if (step === "nombre") {
                    if (val.length < 3) {
                        typing.remove();
                        addMessage("⚠️ Por favor ingresa tu nombre completo.", "bot");
                        enableInput("Nombres y apellidos...");
                        return;
                    }
                    userData.nombre = val;
                    await wait(700);
                    typing.remove();
                    addMessage(`Gusto en conocerte, **${val}**. Ahora necesito tu **número de teléfono de contacto**.`, "bot");
                    step = "telefono";
                    enableInput("Número de teléfono...");
                }
                else if (step === "telefono") {
                    const tel = val.replace(/[\s\-\(\)]/g, "");
                    if (!/^\d{7,15}$/.test(tel)) {
                        typing.remove();
                        addMessage("⚠️ Por favor ingresa un número de teléfono válido (solo dígitos, mínimo 7).", "bot");
                        enableInput("Número de teléfono...");
                        return;
                    }
                    userData.telefono = tel;
                    await wait(700);
                    typing.remove();
                    addMessage(`Perfecto. Ahora adjunta una **foto del ticket de Baloto Revancha** usando el botón 📷 de abajo. 
                    
Asegúrate de que la foto sea **completa y en forma vertical**:

[guide:vertical]

La imagen es **obligatoria** y el sistema extraerá tu número automáticamente.`, "bot");
                    step = "comprobante";
                    disableInput("Adjunta la foto con el botón 📷...");
                    setCameraActive(true);
                }
                else if (step === "registro") {
                    if (val.length < 1) {
                        typing.remove();
                        addMessage("⚠️ Por favor ingresa el número de ticket.", "bot");
                        enableInput("Número de ticket...");
                        return;
                    }
                    // Limpiar guiones, espacios y otros símbolos
                    const cleanTicket = val.replace(/[^a-zA-Z0-9]/g, "").toUpperCase();
                    pendingRegistro = cleanTicket;
                    
                    await wait(700);
                    typing.remove();
                    addMessage(`¡Perfecto! Número de ticket **${cleanTicket}** recibido. 🎟️`, "bot");
                    await wait(600);
                    if (userData.comprobante_url) {
                        disableInput("Registrando...");
                        await submitRegistration(userData.comprobante_url);
                    } else {
                        addMessage(`Ahora adjunta una **foto del ticket de Baloto Revancha** usando el botón 📷 de abajo. 
                        
Asegúrate de que la foto sea **completa y en forma vertical**:

[guide:vertical]

La imagen es **obligatoria** para completar el registro.`, "bot");
                        step = "comprobante";
                        disableInput("Adjunta la foto del ticket con el botón 📷...");
                        setCameraActive(true);
                    }
                    return;
                }
                else if (step === "confirmacion_ticket") {
                    typing.remove();
                    const choice = val.toLowerCase();
                    if (choice === "sí" || choice === "si" || choice === "correcto") {
                        addMessage("¡Excelente! Procedo con el registro.", "bot");
                        disableInput("Registrando...");
                        await submitRegistration(userData.comprobante_url);
                    } else if (choice === "no" || choice === "incorrecto") {
                        addMessage("Entendido. Por favor, **escribe el número de ticket correctamente** aquí abajo:", "bot");
                        step = "registro";
                        enableInput("Número de ticket...");
                    } else {
                        addMessage("Por favor, selecciona **Sí** o **No** para continuar.", "bot");
                        addMessage(`¿El número **${pendingRegistro}** es correcto?\n\n[choices:Sí|No]`, "bot");
                        enableInput("Selecciona una opción...");
                    }
                    return;
                }
            } catch (e) {
                typing.remove();
                addMessage("Ocurrió un error de red. Intenta de nuevo.", "bot");
                enableInput();
            }
        }

        function confetti() {
            const colors = ['#ffcc00', '#002147', '#22c55e', '#ff4d4d', '#ffffff'];
            for (let i = 0; i < 100; i++) {
                const p = document.createElement('div');
                const size = Math.random() * 10 + 5 + 'px';
                p.style.cssText = `position:fixed;width:${size};height:${Math.random() > 0.5 ? size : '4px'};
                    background:${colors[Math.floor(Math.random() * colors.length)]};
                    left:${Math.random() * 100}vw;top:-20px;z-index:9999;
                    border-radius:${Math.random() > 0.5 ? '50%' : '2px'}`;
                document.body.appendChild(p);
                const duration = Math.random() * 3000 + 2000;
                const dx = (Math.random() - 0.5) * 400;
                const rot = Math.random() * 720 + 360;
                p.animate([
                    { transform: `translate(0,0) rotate(0deg)`, opacity: 1 },
                    { transform: `translate(${dx}px,100vh) rotate(${rot}deg)`, opacity: 0 }
                ], { duration, delay: Math.random() * 1500, easing: 'cubic-bezier(0,.9,.6,1)' })
                    .onfinish = () => p.remove();
            }
        }

        cameraBtn.onclick = () => {
            if (step !== "done") fileInput.click();
        };

        async function submitRegistration(imgUrl) {
            const typing2 = showTyping();
            try {
                const regRes = await fetch(`${API_URL}register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        cedula: userData.cedula,
                        nombre_completo: userData.nombre,
                        telefono: userData.telefono,
                        sorteo_id: sorteoId,
                        numero_registro: pendingRegistro,
                        comprobante_url: imgUrl
                    })
                });
                typing2.remove();

                if (regRes.ok) {
                    const regData = await regRes.json();
                    const total = regData.total_tickets;
                    addMessage(`✅ ¡Ticket registrado exitosamente! Mucha suerte. 🎉`, "bot");
                    addMessage(`Llevas **${total} ticket${total !== 1 ? 's' : ''} registrado${total !== 1 ? 's' : ''}** en este sorteo.`, "bot");
                    if (total < 10) {
                        const faltan = 10 - total;
                        addMessage(
                            `🏍️ ¡Recuerda! Si llegas a **10 tickets registrados** puedes participar por la **motocicleta eléctrica**. Te faltan **${faltan}** ticket${faltan !== 1 ? 's' : ''}.`,
                            "bot"
                        );
                    } else {
                        addMessage(
                            `🏍️ ¡Felicitaciones! Ya tienes **${total} tickets** registrados. ¡Estás participando por la **motocicleta eléctrica**!`,
                            "bot"
                        );
                    }
                    confetti();
                    step = "done";
                    disableInput("¡Registro completado! 🎉");
                } else {
                    const errorData = await regRes.json();
                    const errorMsg = errorData.detail || "Hubo un error en el registro.";
                    addMessage(`⚠️ **Error:** ${errorMsg}`, "bot");
                    
                    if (errorMsg.includes("registrado anteriormente")) {
                        addMessage("Si tienes otro ticket, envíalo usando el botón 📷 de abajo.", "bot");
                        step = "comprobante";
                        disableInput("Adjunta otro ticket con 📷...");
                        setCameraActive(true);
                    } else {
                        addMessage(`Por favor, ingresa un **número de ticket válido** e intenta de nuevo.`, "bot");
                        step = "registro";
                        pendingRegistro = null;
                        enableInput("Número de ticket...");
                    }
                }
            } catch (err) {
                typing2.remove();
                addMessage("Hubo un problema de conexión. Intenta enviar el número nuevamente.", "bot");
                step = "registro";
                enableInput("Número de ticket...");
            }
        }

        fileInput.onchange = async () => {
            if (fileInput.files.length === 0) return;
            if (step !== "comprobante") {
                fileInput.value = "";
                return;
            }

            const originalFile = fileInput.files[0];
            
            disableInput("Procesando imagen...");
            const typing = showTyping();
            
            // Mostrar aviso si la imagen es horizontal antes de procesar
            const img = new Image();
            const objectUrl = URL.createObjectURL(originalFile);
            img.onload = () => {
                if (img.width > img.height) {
                    addMessage("⚠️ **Aviso:** He detectado que tu foto está horizontal. Aunque intentaremos procesarla, te recomendamos tomarla en forma **vertical** para mejores resultados.", "bot");
                }
                URL.revokeObjectURL(objectUrl);
            };
            img.src = objectUrl;

            const file = await processImage(originalFile);

            const formData = new FormData();
            formData.append('file', file);

            chatInput.placeholder = "Subiendo y extrayendo número...";

            try {
                const uploadUrl = `${API_URL}upload-receipt${sorteoNombre ? `?sorteo_nombre=${encodeURIComponent(sorteoNombre)}` : ''}`;
                const uploadRes = await fetch(uploadUrl, { method: 'POST', body: formData });
                const uploadData = await uploadRes.json();
                typing.remove();

                if (!uploadData.url && uploadData.error_validacion) {
                    addMessage(`⚠️ **Aviso:** ${uploadData.error_validacion}`, "bot");
                    disableInput("Sube una foto más clara con 📷...");
                    setCameraActive(true);
                    fileInput.value = "";
                    return;
                }

                if (!uploadData.url) {
                    addMessage("Error al subir la imagen. Intenta de nuevo.", "bot");
                    disableInput("Adjunta la foto del ticket con el botón 📷...");
                    fileInput.value = "";
                    return;
                }

                addMessage("He adjuntado mi ticket:", "user", uploadData.url);
                setCameraActive(false);

                if (!uploadData.numero_registro) {
                    addMessage("No pudimos leer el número automáticamente (asegúrate de que la foto sea vertical y tenga buena luz). 💡\n\nPor favor, **escribe el número de ticket** manualmente para continuar:", "bot");
                    userData.comprobante_url = uploadData.url;
                    step = "registro";
                    enableInput("Escribe el número aquí...");
                    return;
                }

                pendingRegistro = uploadData.numero_registro;
                userData.comprobante_url = uploadData.url;
                
                addMessage(`🔍 He detectado el número: **${pendingRegistro}**.`, "bot");
                addMessage(`¿Este número es correcto?\n\n[choices:Sí|No]`, "bot");
                
                step = "confirmacion_ticket";
                enableInput("Selecciona Sí o No...");

            } catch (e) {
                typing.remove();
                addMessage("Ocurrió un error al procesar la imagen.", "bot");
                disableInput("Adjunta la foto del ticket con el botón 📷...");
            }
            fileInput.value = "";
        };

        async function processImage(file) {
            return file;
        }

        function sendAction(text) {
            if (chatInput.disabled && step !== "confirmacion_ticket") return;
            chatInput.value = text;
            handleSend();
        }

        const wait = (ms) => new Promise(res => setTimeout(res, ms));

        sendBtn.onclick = handleSend;
        chatInput.onkeydown = (e) => { if (e.key === "Enter") handleSend(); };

        // ---- Mobile layout: dynamic positioning ----
        // Measures header height in real-time and adjusts the chat-wrapper
        // so it always fills the space between header and top of keyboard.
        function setupMobileLayout() {
            const isMobile = window.matchMedia('(max-width: 600px)').matches;
            if (!isMobile) return;

            const wrapper = document.querySelector('.chat-wrapper');
            const header = document.querySelector('.brand-header');

            function updateLayout() {
                const headerH = header.offsetHeight;
                const vv = window.visualViewport;
                // keyboardHeight = space between bottom of visual viewport and bottom of layout viewport
                const kbHeight = vv
                    ? Math.max(0, window.innerHeight - vv.offsetTop - vv.height)
                    : 0;

                wrapper.style.top = headerH + 'px';
                wrapper.style.bottom = kbHeight + 'px';
                wrapper.style.height = 'auto';

                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            updateLayout();
            window.addEventListener('resize', updateLayout);

            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', updateLayout);
                window.visualViewport.addEventListener('scroll', updateLayout);
            }
        }

        window.onload = () => { init(); setupMobileLayout(); };
    </script>
</body>
